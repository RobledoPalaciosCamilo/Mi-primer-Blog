<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background-color: #f0f4f8; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .login-card { background: white; padding: 3rem; border-radius: 12px; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); width: 100%; max-width: 400px; text-align: center; }
        .login-title { font-size: 1.75rem; color: #1e293b; margin-bottom: 2rem; font-weight: 700; }
        
        .form-group { margin-bottom: 1.5rem; text-align: left; }
        .form-group label { display: block; font-weight: 600; margin-bottom: 0.5rem; color: #475569; }
        .form-control { width: 100%; padding: 0.75rem; border: 1px solid #cbd5e1; border-radius: 8px; font-size: 1rem; }
        .form-control:focus { outline: none; border-color: #3b82f6; box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1); }
        
        .btn-submit { width: 100%; background: linear-gradient(135deg, #3b82f6 0%, #1d4ed8 100%); color: white; padding: 1rem; border: none; border-radius: 8px; font-size: 1.1rem; font-weight: bold; cursor: pointer; transition: transform 0.2s; }
        .btn-submit:hover { transform: translateY(-2px); }
        
        .error-message { color: #ef4444; background-color: #fee2e2; padding: 0.75rem; border-radius: 8px; margin-bottom: 1.5rem; font-size: 0.9rem; }
    </style>
</head>
<body>

    <div class="login-card">
        <h2 class="login-title">🔐 Iniciar Sesión</h2>
        
        {% if form.errors %}
            <div class="error-message">
                Usuario o contraseña incorrectos. Por favor, intenta de nuevo.
            </div>
        {% endif %}

        <form method="POST">
            {% csrf_token %}
            
            <div class="form-group">
                <label for="id_username">Nombre de Usuario</label>
                {{ form.username }}
            </div>
            
            <div class="form-group">
                <label for="id_password">Contraseña</label>
                {{ form.password }}
            </div>
            
            <button type="submit" class="btn-submit">Entrar al Sistema</button>
        </form>
        
        <div style="margin-top: 1.5rem;">
            <a href="{% url 'lista_posts' %}" style="color: #64748b; text-decoration: none; font-size: 0.9rem;">← Volver al inicio</a>
        </div>
    </div>

</body>
</html>
