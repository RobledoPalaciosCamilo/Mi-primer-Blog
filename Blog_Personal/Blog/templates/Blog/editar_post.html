<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editar Post</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background-color: #f0f4f8; color: #1a202c; line-height: 1.6; }
        .navbar { background-color: #008ca5; color: #f8fafc; padding: 1rem 2rem; }
        .navbar-brand { font-size: 1.5rem; font-weight: 700; text-decoration: none; color: white; }
        .main-container { max-width: 600px; margin: 30px auto; padding: 0 1.5rem; }
        .form-card { background: white; padding: 2.5rem; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .form-title { font-size: 1.75rem; color: #1e293b; margin-bottom: 1.5rem; }
        .form-group { margin-bottom: 1.5rem; }
        .form-group label { display: block; font-weight: 600; margin-bottom: 0.5rem; color: #475569; }
        .form-control { width: 100%; padding: 0.75rem; border: 1px solid #cbd5e1; border-radius: 8px; font-size: 1rem; font-family: inherit; }
        .btn-submit { width: 100%; background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%); color: white; padding: 1rem; border: none; border-radius: 8px; font-size: 1.1rem; font-weight: bold; cursor: pointer; margin-top: 1rem; }
        .btn-cancel { display: block; text-align: center; color: #64748b; text-decoration: none; margin-top: 1.25rem; font-size: 0.95rem; }
    </style>
</head>
<body>
    <nav class="navbar"><a href="{% url 'lista_posts' %}" class="navbar-brand">🚀 Blog Informatico</a></nav>
    <main class="main-container">
        <div class="form-card">
            <h2 class="form-title">✏️ Editar Artículo</h2>
            <form method="POST" enctype="multipart/form-data">
                {% csrf_token %}
                {% for field in form %}
                    <div class="form-group">
                        <label for="{{ field.id_for_label }}">{{ field.label }}</label>
                        {{ field }}
                    </div>
                {% endfor %}
                <button type="submit" class="btn-submit">Guardar Cambios</button>
                <a href="{% url 'detalle_post' post.id %}" class="btn-cancel">Cancelar</a>
            </form>
        </div>
        <footer class="text-center mt-5">
            <p>&copy; 2026 Blog Informatico. Todos los derechos reservados.</p>
        </footer>
    </main>
</body>
</html>
