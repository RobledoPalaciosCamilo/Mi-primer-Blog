<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background-color: #f0f4f8; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .login-card { background: white; padding: 3rem; border-radius: 12px; box-shadow: 0 10px 25px -5px rgba(0,0,0,0.1); width: 100%; max-width: 420px; }
        .login-title { font-size: 1.8rem; color: #1e293b; margin-bottom: 2rem; font-weight: 700; text-align: center; }
        
        .form-group { margin-bottom: 1.5rem; text-align: left; }
        .form-group label { display: block; font-weight: 600; margin-bottom: 0.5rem; color: #475569; font-size: 0.95rem; }
        
        /* MAGIA CSS: Estilizamos todos los inputs que Django genera por defecto */
        .form-group input[type="text"], 
        .form-group input[type="password"] { 
            width: 100%; 
            padding: 0.85rem; 
            border: 2px solid #e2e8f0; 
            border-radius: 8px; 
            font-size: 1rem; 
            transition: all 0.2s ease;
            background-color: #f8fafc;
        }
        .form-group input[type="text"]:focus, 
        .form-group input[type="password"]:focus { 
            outline: none; 
            border-color: #3b82f6; 
            background-color: white;
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.15); 
        }
        
        .btn-submit { width: 100%; background: linear-gradient(135deg, #3b82f6 0%, #1d4ed8 100%); color: white; padding: 1rem; border: none; border-radius: 8px; font-size: 1.1rem; font-weight: bold; cursor: pointer; transition: transform 0.2s, box-shadow 0.2s; margin-top: 0.5rem; }
        .btn-submit:hover { transform: translateY(-2px); box-shadow: 0 4px 12px rgba(37, 99, 235, 0.3); }
        
        .error-message { color: #b91c1c; background-color: #fee2e2; padding: 1rem; border-radius: 8px; margin-bottom: 1.5rem; font-size: 0.95rem; border-left: 4px solid #ef4444; }
        .help-text { text-align: center; margin-top: 2rem; }
    </style>
</head>
<body>

    <div class="login-card">
        <h2 class="login-title">🔐 Iniciar Sesión</h2>
        
        {% if form.errors %}
            <div class="error-message">
                Usuario o contraseña incorrectos. Por favor, intenta de nuevo.
            </div>
        {% endif %}

        <form method="POST">
            {% csrf_token %}
            
            <div class="form-group">
                <label for="id_username">Nombre de Usuario</label>
                {{ form.username }}
            </div>
            
            <div class="form-group">
                <label for="id_password">Contraseña</label>
                {{ form.password }}
            </div>
            
            <button type="submit" class="btn-submit">Entrar al Sistema</button>
        </form>
        
        <div style="margin-top: 2rem; text-align: center;">
            <p style="color: #64748b; font-size: 0.95rem; margin-bottom: 1rem;">
                ¿No tienes cuenta? <a href="{% url 'registro' %}" style="color: #10b981; font-weight: 600; text-decoration: none;">Regístrate aquí</a>
            </p>
            <a href="{% url 'lista_posts' %}" style="color: #94a3b8; text-decoration: none; font-size: 0.9rem;">← Volver al inicio</a>
        </div>
    </div>

</body>
</html>
